name: CI

on:
  push:
    branches:
      - main
jobs:
  docker-steps:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build local Docker image
        run: docker build -t my-app:latest .

      - name: Running docker
        run: docker run -d --rm -p 80:8080 --name app-container my-app:latest

      - name: Healthcheck ping
        run: |
          echo "Waiting for app to start..."
          for i in {1..15}; do
            if curl -s -f http://localhost/ping; then
              echo "App is healthy!"
              exit 0
            fi
            echo "Retrying..."
            sleep 2
          done
          echo "Healthcheck failed!"
          docker logs app-container
          exit 1

      - name: Stop container
        if: always()
        run: docker stop app-container