name: CI

on:
  push:
    branches:
      - main
jobs:
  docker-steps:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Build local Docker image
        run: docker build -t my-app:latest .

      - name: Run Docker container
        run: docker run --rm my-app:latest go test
